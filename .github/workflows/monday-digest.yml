name: Monday Hearings Digest

on:
  # Every Monday at 9:00 AM ET (13:00 UTC — EDT = UTC-4 in summer)
  schedule:
    - cron: "0 13 * * 1"

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: "Digest mode"
        required: false
        default: "this-week"
        type: choice
        options:
          - this-week
          - weekly
          - daily

jobs:
  send-digest:
    name: Generate & Send Monday Digest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Write config.json using Python so quoting/JSON is always valid
      - name: Write config.json from secrets
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CONGRESS_API_KEY:   ${{ secrets.CONGRESS_API_KEY }}
          GOVINFO_API_KEY:    ${{ secrets.GOVINFO_API_KEY }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
          DIGEST_TO_EMAILS:   ${{ secrets.DIGEST_TO_EMAILS }}
        run: |
          python - <<'PYEOF'
          import json, os
          to_emails_raw = os.environ.get("DIGEST_TO_EMAILS", "[]").strip()
          try:
              to_emails = json.loads(to_emails_raw)
          except Exception:
              # fallback: treat as comma-separated plain emails
              to_emails = [e.strip() for e in to_emails_raw.split(",") if e.strip()]
          cfg = {
              "congress_api_key": os.environ.get("CONGRESS_API_KEY", ""),
              "govinfo_api_key":  os.environ.get("GOVINFO_API_KEY", "DEMO_KEY"),
              "dashboard_url":    os.environ.get("DASHBOARD_URL", ""),
              "digest": {
                  "gmail_user":         os.environ.get("GMAIL_USER", ""),
                  "gmail_app_password": os.environ.get("GMAIL_APP_PASSWORD", ""),
                  "from_name":          "ClearPath Hearings Dashboard",
                  "to_emails":          to_emails,
              }
          }
          import pathlib
          pathlib.Path("data").mkdir(exist_ok=True)
          pathlib.Path("data/config.json").write_text(json.dumps(cfg, indent=2))
          print(f"config.json written — gmail_user={cfg['digest']['gmail_user']!r}, recipients={to_emails}")
          PYEOF

      # Fetch fresh hearing data from Congress.gov so the digest has real content
      - name: Fetch latest hearings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_all_hearings.py
        continue-on-error: true   # don't fail the whole job if fetch has issues

      - name: Run this-week digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'this-week' }}"
          python digest.py --$MODE
